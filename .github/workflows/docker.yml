name: Build and Push Docker Image

on:
  release:
    types: [created]

jobs:
  build-and-push:
    name: Build ${{ matrix.name }} (${{ matrix.arch }})
    # Logic to switch between x64 and ARM64 runners
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Gitpod - amd64 only
          - name: Gitpod
            file: ./Docker/Dockerfile.vnc
            tags: rustlluk/pycub:gitpod
            arch: amd64
            platforms: linux/amd64
            build_args: |
              USERNAME=gitpod

          # 2. VNC - amd64
          - name: VNC
            file: ./Docker/Dockerfile.vnc
            tags: rustlluk/pycub:vnc-amd64
            arch: amd64
            platforms: linux/amd64
            build_args: ""

          # 3. VNC - arm64 (Native)
          - name: VNC
            file: ./Docker/Dockerfile.vnc
            tags: rustlluk/pycub:vnc-arm64
            arch: arm64
            platforms: linux/arm64
            build_args: ""

          # 4. Standard - amd64
          - name: Standard
            file: ./Docker/Dockerfile
            tags: rustlluk/pycub:amd64
            arch: amd64
            platforms: linux/amd64
            build_args: ""

          # 5. Standard - arm64 (Native)
          - name: Standard
            file: ./Docker/Dockerfile
            tags: rustlluk/pycub:arm64
            arch: arm64
            platforms: linux/arm64
            build_args: ""

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true

      - uses: actions/checkout@v4

      # QEMU is removed because we are running on native hardware
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platforms }}
          context: ./Docker
          push: true
          file: ${{ matrix.file }}
          tags: ${{ matrix.tags }}
          build-args: ${{ matrix.build_args }}